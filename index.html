<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Suprimentos - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <div class="main-content">
        
        <section class="card banner-welcome">
            <div class="bot-area">
                <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="Robô Assistente" class="bot-img">
                <div class="welcome-msg">
                    <h1>Olá, tudo bem?</h1>
                    <p>Como posso ajudar hoje?</p>
                    <button class="btn-chat">Fale comigo! ➔</button>
                </div>
            </div>
            <div class="quick-actions">
                <button class="btn-nav">QUERO COMPRAR MATERIAL <span>➔</span></button>
                <button class="btn-nav">QUERO COMPRAR SERVIÇO <span>➔</span></button>
                <button class="btn-nav">CONSULTAR FLUXO DE PROCESSOS <span>➔</span></button>
                <button class="btn-nav">STATUS DAS MINHAS REQUISIÇÕES <span>➔</span></button>
                <button class="btn-nav">NÃO SEI AO CERTO, ME AJUDE <span>➔</span></button>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>Baseado em suas últimas compras</h2>
                <a href="#">Ver todas as recomendações +</a>
            </div>
            <div class="products-row">
                <div class="product-card">
                    <div class="prod-img">📦</div>
                    <p>Papel Sulfite A4</p>
                    <strong>R$ 34,41</strong>
                </div>
                <div class="product-card">
                    <div class="prod-img">🔹</div>
                    <p>Solicitar Serviço</p>
                    <strong>R$ 123,45</strong>
                </div>
                <div class="product-card">
                    <div class="prod-img">📎</div>
                    <p>Grampeador</p>
                    <strong>R$ 18,00</strong>
                </div>
                <div class="product-card">
                    <div class="prod-img">🖊️</div>
                    <p>Caneta Bic Azul</p>
                    <strong>R$ 1,00</strong>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>Status das últimas requisições</h2>
                <a href="#">Ver todos processos +</a>
            </div>
            <div class="timeline-container">
                <div class="process-line">
                    <span class="order-id"># 12345</span>
                    <div class="steps">
                        <div class="step done">✓</div>
                        <div class="connector done"></div>
                        <div class="step done">✓</div>
                        <div class="connector"></div>
                        <div class="step warning">3</div>
                        <div class="connector"></div>
                        <div class="step disabled">4</div>
                    </div>
